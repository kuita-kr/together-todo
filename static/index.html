<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>함께해요 · together-todo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fffdf7; --ink:#2b2a26; --line:#e6e0d0;
    --todo:#ffd166; --doing:#5bc8e8; --done:#8ed081;
    --subject:#2b6e85; --ending:#c47d00;
    --tap:48px;                       /* min touch target for little fingers */
  }
  *{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Noto Sans KR',sans-serif; color:var(--ink);
    background:
      radial-gradient(circle at 18% 8%, #fff7e6, transparent 40%),
      radial-gradient(circle at 92% 90%, #eafaff, transparent 45%), var(--paper);
    padding:env(safe-area-inset-top) 20px 140px; padding-top:18px;
    -webkit-text-size-adjust:100%; overscroll-behavior:none;
  }
  .head{max-width:1100px; margin:0 auto; display:flex; align-items:center; gap:14px; flex-wrap:wrap}
  h1{font-family:'Jua'; font-size:2rem; flex:1; min-width:160px}
  h1 small{display:block; font-size:.8rem; color:#9a927e; font-weight:400; font-family:'Noto Sans KR'}

  /* user switcher */
  .users{display:flex; gap:8px}
  .users button{font-family:'Jua'; font-size:1rem; min-height:var(--tap);
    padding:8px 16px; border:2px solid var(--ink); border-radius:999px; background:#fff; cursor:pointer}
  .users button.active{background:var(--ink); color:#fff}
  .users .age{font-size:.7rem; opacity:.7; font-family:'Noto Sans KR'}
  .users button.manage{padding:8px 12px; border-style:dashed; background:#fff; opacity:.8}

  .board{display:grid; grid-template-columns:repeat(3,1fr); gap:16px;
    max-width:1100px; margin:18px auto}
  .col{background:#fff; border:2px solid var(--line); border-radius:20px; padding:14px; min-height:46vh}
  .col h2{font-family:'Jua'; font-size:1.2rem; padding:8px; border-radius:14px; margin-bottom:12px; text-align:center}
  .col[data-c=todo] h2{background:var(--todo)}
  .col[data-c=doing] h2{background:var(--doing)}
  .col[data-c=done] h2{background:var(--done)}

  .card{background:var(--paper); border:2px solid var(--line); border-radius:16px;
    padding:12px 14px; margin-bottom:12px; box-shadow:0 5px 0 rgba(0,0,0,.07); animation:pop .22s ease}
  @keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}

  /* parts shown as chips — the recyclable pieces + the tense */
  .chips{display:flex; align-items:center; gap:6px; flex-wrap:wrap}
  .chip{font-family:'Jua'; font-size:1.3rem; line-height:1; padding:6px 10px; border-radius:10px}
  .chip.prefix{background:#efe7d2}
  .chip.prefix.swap{cursor:pointer; border:2px dashed #c9b27a; padding:4px 8px}
  .chip.prefix.swap:active{transform:translateY(1px)}
  .swapmark{font-size:.7rem; color:#a98c4a; margin-left:5px; vertical-align:middle}
  .chip.subject{background:#e3f3f8; color:var(--subject)}
  .chip.ending{background:#fdeecb; color:var(--ending)}     /* changes by column */
  .plus{color:#bdb6a3; font-size:1.1rem}
  .en{font-size:.82rem; color:#9a927e; margin-top:6px}
  .en .stars{color:#e0a800}

  .row{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap}
  .row button{font-family:'Noto Sans KR'; font-weight:700; min-height:var(--tap);
    border:2px solid var(--ink); background:#fff; border-radius:999px; padding:8px 14px; font-size:.92rem; cursor:pointer}
  .row button:active{transform:translateY(2px)}
  .row .star{min-height:40px; padding:6px 10px; border-color:#e0a800}
  .row .back{border-color:#c0392b; color:#c0392b}      /* reverse = parent action */
  .row .opt{background:#eafaff; border-color:var(--doing)}
  .speak{border:none!important; background:none!important; font-size:1.2rem; padding:0 4px!important; cursor:pointer; min-height:auto!important}

  /* input bar */
  .bar{position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:2px solid var(--line);
    padding:14px 16px calc(14px + env(safe-area-inset-bottom)); display:flex; gap:10px; justify-content:center; align-items:center}
  .bar input{flex:1; max-width:560px; font-family:'Noto Sans KR'; font-size:16px;  /* 16px stops iOS zoom */
    min-height:var(--tap); padding:10px 16px; border:2px solid var(--line); border-radius:999px; outline:none}
  .bar button{font-family:'Jua'; min-height:var(--tap); min-width:var(--tap);
    border:2px solid var(--ink); border-radius:999px; padding:10px 18px; font-size:1rem; cursor:pointer}
  .bar .go{background:var(--doing)} .bar .mic{background:var(--todo)}
  .toast{position:fixed; bottom:92px; left:50%; transform:translateX(-50%); background:var(--ink);
    color:#fff; padding:10px 18px; border-radius:999px; font-size:.95rem; opacity:0; transition:opacity .3s; pointer-events:none}
  .toast.show{opacity:1}
  .hint{max-width:1100px; margin:8px auto 0; text-align:center; color:#9a927e; font-size:.82rem}

  /* parent mode */
  .parent-toggle{font-family:'Jua'; font-size:.95rem; min-height:var(--tap);
    padding:8px 14px; border:2px solid var(--ink); border-radius:999px; background:#fff; cursor:pointer}
  .parent-toggle.on{background:var(--ink); color:#fff}
  .panels{max-width:1100px; margin:14px auto 0; display:flex; flex-direction:column; gap:16px}
  .panel{background:#fff; border:2px solid var(--line); border-radius:20px; padding:16px}
  .panel h3{font-family:'Jua'; font-size:1.05rem; margin-bottom:10px; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .panel h3 .sub{font-family:'Noto Sans KR'; font-weight:400; font-size:.78rem; color:#9a927e}
  .panel .spacer{flex:1}
  .panel .mini{font-family:'Noto Sans KR'; font-weight:700; min-height:38px; padding:6px 12px;
    border:2px solid var(--ink); background:#fff; border-radius:999px; font-size:.85rem; cursor:pointer}
  .panel .mini.primary{background:var(--todo)}
  .panel .mini.on{background:var(--doing)}

  /* menu notes */
  .notes-kids{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px}
  .note{background:var(--paper); border:2px solid var(--line); border-radius:12px; padding:6px 12px; font-size:.9rem}
  .note b{color:var(--subject)}
  .counts{display:flex; flex-wrap:wrap; gap:8px}
  .count{background:#fdeecb; border-radius:12px; padding:6px 12px; font-size:.95rem; font-weight:700; color:var(--ending)}
  .count .who{font-weight:400; color:#9a927e; font-size:.8rem}

  /* word bag (draggable) */
  .bag{display:flex; flex-wrap:wrap; gap:8px}
  .word{font-family:'Jua'; font-size:1.15rem; padding:8px 14px; border-radius:12px; background:#efe7d2;
    border:2px solid #c9b27a; cursor:grab; user-select:none; position:relative}
  .word:active{cursor:grabbing}
  .word .x{margin-left:8px; color:#b06; font-size:.85rem; cursor:pointer}
  .card.drop{outline:3px dashed var(--doing); outline-offset:2px}

  /* task bag — uniform grid so cards never balloon to content / overlap */
  .tasks{display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; align-items:start}
  .task{background:var(--paper); border:2px solid var(--line); border-radius:14px; padding:10px 12px;
    display:flex; flex-direction:column; gap:8px; min-width:0}
  .task .ttl{font-family:'Jua'; font-size:1.05rem; word-break:keep-all}
  .task .ttl .tag{font-family:'Noto Sans KR'; font-size:.68rem; font-weight:700; color:#fff;
    background:var(--done); border-radius:8px; padding:2px 6px; margin-left:6px}
  .task .en{margin:0}
  .task .assign{display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-top:auto;
    padding-top:8px; border-top:1px solid var(--line)}
  .task .assign .mini{flex:0 0 auto}
  .task .assign .del{margin-left:auto; border-color:#c0392b; color:#c0392b}
  .add-form{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px}
  .add-form input{font-family:'Noto Sans KR'; font-size:16px; min-height:38px; padding:6px 12px;
    border:2px solid var(--line); border-radius:10px; outline:none}
  .add-form input.s{width:90px}

  /* iPad portrait & phones: let columns scroll horizontally, full-size taps */
  @media (max-width:820px){
    .board{grid-template-columns:repeat(3, 78vw); overflow-x:auto; scroll-snap-type:x mandatory;
      -webkit-overflow-scrolling:touch; padding-bottom:8px}
    .col{scroll-snap-align:center; min-height:40vh}
    h1{font-size:1.6rem}
  }
</style>
</head>
<body>
  <div class="head">
    <h1>함께해요 <small>together-todo</small></h1>
    <div class="users" id="users"></div>
    <button class="parent-toggle" id="parentBtn" title="부모 모드">🔒 부모</button>
  </div>
  <div class="board" id="board"></div>
  <p class="hint">말해보세요: “양치 했어” · “숙제 시작할게” · 부모: “숙제 아직 안 했어” (되돌리기) · “내일 뭐 할까?”</p>

  <div class="panels" id="panels" hidden></div>

  <div class="bar">
    <button class="mic" id="mic" title="말하기">🎤</button>
    <input id="say" placeholder="말하거나 입력하세요 / say or type…" />
    <button class="go" id="go">▶</button>
  </div>
  <div class="toast" id="toast"></div>

<script>
const COLS=[["todo","할 일"],["doing","하는 중"],["done","끝!"]];
let USER=null, USERS=[], PARENT=false;
const kids=()=>USERS.filter(u=>(u.role||"child")!=="parent");   // board owners only

function speak(text){
  if(!window.speechSynthesis) return;
  const u=new SpeechSynthesisUtterance(text); u.lang="ko-KR"; u.rate=0.9;
  const ko=speechSynthesis.getVoices().find(v=>v.lang==="ko-KR"); if(ko)u.voice=ko;
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}
function toast(m){const t=document.getElementById("toast");t.textContent=m;
  t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1700);}

function renderUsers(){
  const root=document.getElementById("users"); root.innerHTML="";
  for(const u of kids()){
    const b=document.createElement("button");
    b.innerHTML=`${u.name} <span class="age">${u.age}살</span>`;
    if(u.id===USER) b.classList.add("active");
    b.onclick=()=>{USER=u.id; load();};
    root.appendChild(b);
  }
  // parent controls: edit the current child, or add a new one
  const edit=document.createElement("button"); edit.className="manage"; edit.textContent="✏️";
  edit.title="이름·나이 고치기 (부모)"; edit.onclick=editUser; root.appendChild(edit);
  const add=document.createElement("button"); add.className="manage"; add.textContent="➕";
  add.title="아이 추가 (부모)"; add.onclick=addUser; root.appendChild(add);
}

async function refreshUsers(preferId){
  USERS=await (await fetch("/users")).json();
  const list=kids();
  USER=(list.find(u=>u.id===preferId)||list[0]||{}).id ?? null;
  if(USER==null){ document.getElementById("users").innerHTML=""; document.getElementById("board").innerHTML=""; addUser(); return; }
  load();
}

function askAge(label,def){
  const raw=prompt(label,def==null?"":def); if(raw===null) return null;
  const n=parseInt(raw,10); return Number.isFinite(n)&&n>0?n:null;
}

async function addUser(){
  const name=prompt("아이 이름 / Child's name");
  if(!name||!name.trim()) return;
  const age=askAge("나이 / Age",""); if(age==null) return;
  const u=await (await fetch("/users",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:name.trim(),age})})).json();
  refreshUsers(u.id);
}

async function editUser(){
  const cur=USERS.find(u=>u.id===USER); if(!cur) return;
  const name=prompt("이름 / Name (또는 '삭제'/'delete' 로 지우기)",cur.name);
  if(name===null) return;
  if(["삭제","delete"].includes(name.trim().toLowerCase())){
    if(!confirm(`${cur.name} 삭제할까요? (카드도 함께 지워져요)`)) return;
    await fetch("/users/"+USER,{method:"DELETE"}); refreshUsers(); return;
  }
  const age=askAge("나이 / Age",cur.age); if(age==null) return;
  await fetch("/users/"+USER,{method:"PATCH",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:name.trim()||cur.name,age})});
  refreshUsers(USER);
}

function cardEl(c,col){
  const el=document.createElement("div"); el.className="card";
  // drop a word from the 낱말 주머니 onto any card to set its prefix (parent)
  el.ondragover=e=>{if(PARENT){e.preventDefault(); el.classList.add("drop");}};
  el.ondragleave=()=>el.classList.remove("drop");
  el.ondrop=e=>{e.preventDefault(); el.classList.remove("drop");
    const w=e.dataTransfer.getData("text/plain"); if(w) tap("set_prefix",c.id,{prefix:w});};
  const p=c.parts;
  const chips=document.createElement("div"); chips.className="chips";
  const swappable=(c.prefix_options||[]).length>0;
  if(p.prefix){
    const swap=swappable?" swap":"";
    const hint=swappable?`<span class="swapmark">⇄</span>`:"";
    chips.innerHTML+=`<span class="chip prefix${swap}" title="${swappable?'눌러서 바꾸기':''}">${p.prefix}${hint}</span><span class="plus">+</span>`;
  }
  chips.innerHTML+=`<span class="chip subject">${p.subject}</span>`;
  if(p.ending){chips.innerHTML+=`<span class="plus">+</span><span class="chip ending">${p.ending}</span>`;}
  chips.innerHTML+=`<button class="speak" title="읽어주기">🔊</button>`;
  el.appendChild(chips);
  if(swappable){               // tap the prefix chip to swap 저녁 -> 점심 -> 아침
    el.querySelector(".chip.prefix").onclick=()=>{
      const opts=c.prefix_options, i=opts.indexOf(c.prefix);
      tap("set_prefix",c.id,{prefix:opts[(i+1)%opts.length]});
    };
  }
  const stars=c.stars?` <span class="stars">${"★".repeat(c.stars)}</span>`:"";
  el.insertAdjacentHTML("beforeend",`<div class="en">${c.english||""}${stars}</div>`);
  el.querySelector(".speak").onclick=()=>speak(c.spoken);

  const row=document.createElement("div"); row.className="row";
  if(col==="todo") row.appendChild(btn("시작 ▶","",()=>tap("start",c.id)));
  if(col==="doing"){
    if(c.kind==="choice" && c.options.length){
      c.options.forEach(o=>row.appendChild(btn(o,"opt",()=>tap("complete",c.id,{choice:o}))));
    } else {
      row.appendChild(btn("완료 ✓","",()=>tap("complete",c.id)));
    }
    row.appendChild(btn("↩︎ 되돌리기","back",()=>tap("reverse",c.id)));   // parent
  }
  if(col==="done"){
    if(!c.stars) for(let s=1;s<=5;s++) row.appendChild(btn("★"+s,"star",()=>tap("rate",c.id,{stars:s})));
    row.appendChild(btn("↩︎ 다시","back",()=>tap("reverse",c.id)));        // parent
  }
  el.appendChild(row);
  return el;
}
function btn(label,cls,fn){const b=document.createElement("button");if(cls)b.className=cls;b.textContent=label;b.onclick=fn;return b;}

function render(snap){
  const root=document.getElementById("board"); root.innerHTML="";
  for(const [key,label] of COLS){
    const col=document.createElement("div"); col.className="col"; col.dataset.c=key;
    col.innerHTML=`<h2>${label}</h2>`;
    snap.columns[key].forEach(c=>col.appendChild(cardEl(c,key)));
    root.appendChild(col);
  }
}

async function tap(tool,task_id,extra={}){
  const r=await fetch("/tap",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({tool,task_id,user:USER,...extra})});
  const d=await r.json(); render(d.board);
  if(d.result.ok && d.result.card) speak(d.result.card.spoken);   // hear the new tense
}
async function act(text){
  if(!text.trim())return;
  const r=await fetch("/act",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text,user:USER})});
  const d=await r.json(); render(d.board);
  const a=d.action;
  if(a.tool==="predict"){
    const top=(d.result.ranked||[]).slice(0,3).map(x=>x.subject).join(", ");
    toast("내일 추천: "+(top||"기록 없음")); speak("내일은 "+(top||"기록이 없어요"));
  } else {
    toast(`router → ${a.tool}`);
    if(d.result.ok && d.result.card) speak(d.result.card.spoken);
  }
}

async function load(){
  renderUsers();
  const r=await fetch("/board?user="+USER); render(await r.json());
  renderPanels();
}

// ---- parent mode ---------------------------------------------------------
const parentBtn=document.getElementById("parentBtn");
parentBtn.onclick=async()=>{
  if(PARENT){ PARENT=false; updateParentBtn(); renderPanels(); return; }
  const pin=prompt("부모 PIN / Parent PIN (기본 0000)"); if(pin===null) return;
  const r=await fetch("/parent/verify",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({pin})});
  if(!(await r.json()).ok){ toast("PIN이 맞지 않아요"); return; }
  PARENT=true; updateParentBtn(); renderPanels();
};
function updateParentBtn(){ parentBtn.textContent=(PARENT?"🔓":"🔒")+" 부모"; parentBtn.classList.toggle("on",PARENT); }

function panelEl(title,sub){
  const el=document.createElement("div"); el.className="panel";
  el.innerHTML=`<h3>${title} <span class="sub">${sub}</span></h3>`;
  return el;
}

async function renderPanels(){
  const root=document.getElementById("panels"); root.hidden=!PARENT;
  if(!PARENT){ root.innerHTML=""; return; }
  const [notes,words,items,settings]=await Promise.all([
    fetch("/notes").then(r=>r.json()),
    fetch("/words").then(r=>r.json()),
    fetch("/bag").then(r=>r.json()),
    fetch("/settings").then(r=>r.json()),
  ]);
  root.innerHTML="";
  root.appendChild(notesPanel(notes));   // notes between board and bags (as requested)
  root.appendChild(wordPanel(words));
  root.appendChild(bagPanel(items,settings));
}

function notesPanel(n){
  const el=panelEl("📝 메뉴 메모","아이들이 고른 메뉴 / what each child chose");
  const row=document.createElement("div"); row.className="notes-kids";
  if(!n.per_kid.length) row.innerHTML='<span class="note">아직 고른 메뉴가 없어요</span>';
  n.per_kid.forEach(k=>{const d=document.createElement("div"); d.className="note";
    d.innerHTML=`<b>${k.name}</b> · ${k.choice}`; row.appendChild(d);});
  el.appendChild(row);
  const counts=document.createElement("div"); counts.className="counts";
  n.counts.forEach(c=>{const who=c.by.map(b=>`${b.name} ${b.count}`).join(", ");
    const d=document.createElement("div"); d.className="count";
    d.innerHTML=`${c.choice} <span class="who">×${c.total} (${who})</span>`; counts.appendChild(d);});
  el.appendChild(counts);
  return el;
}

function wordPanel(words){
  const el=panelEl("🏷️ 낱말 주머니","카드 위로 끌어다 놓으세요 / drag a word onto a card");
  const bag=document.createElement("div"); bag.className="bag";
  words.forEach(w=>{
    const chip=document.createElement("div"); chip.className="word"; chip.draggable=true;
    chip.innerHTML=`${w}<span class="x" title="삭제">✕</span>`;
    chip.ondragstart=e=>e.dataTransfer.setData("text/plain",w);
    chip.querySelector(".x").onclick=async ev=>{ev.stopPropagation();
      await fetch("/words/"+encodeURIComponent(w),{method:"DELETE"}); renderPanels();};
    bag.appendChild(chip);
  });
  el.appendChild(bag);
  const form=document.createElement("div"); form.className="add-form";
  const inp=document.createElement("input"); inp.placeholder="새 낱말 / new word";
  const add=document.createElement("button"); add.className="mini primary"; add.textContent="➕ 추가";
  add.onclick=async()=>{const v=inp.value.trim(); if(!v)return;
    await fetch("/words",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({word:v})}); renderPanels();};
  form.append(inp,add); el.appendChild(form);
  return el;
}

function bagPanel(items,settings){
  const el=panelEl("🎒 할 일 주머니","아이에게 보내거나 루틴을 채워요 / assign or fill the routine");
  const head=el.querySelector("h3");
  head.insertAdjacentHTML("beforeend",'<span class="spacer"></span>');
  const auto=settings.routine_mode==="auto";
  const mode=document.createElement("button"); mode.className="mini"+(auto?" on":"");
  mode.textContent=auto?"모드: 자동(평일)":"모드: 수동";
  mode.title="자동: 평일에 보드를 열면 루틴이 채워져요";
  mode.onclick=async()=>{await fetch("/settings",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({routine_mode:auto?"manual":"auto"})}); renderPanels();};
  const fill=document.createElement("button"); fill.className="mini primary"; fill.textContent="오늘 할 일 채우기";
  fill.onclick=async()=>{const d=await (await fetch("/bag/assign-routine",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user:USER})})).json(); toast(`${d.assigned}개 추가됨`); render(d.board);};
  head.append(mode,fill);
  const tasks=document.createElement("div"); tasks.className="tasks";
  items.forEach(t=>tasks.appendChild(taskEl(t)));
  el.appendChild(tasks);
  // add a new template to the bag
  const form=document.createElement("div"); form.className="add-form";
  const sub=document.createElement("input"); sub.placeholder="할 일 / task (예: 양치)";
  const en=document.createElement("input"); en.placeholder="English";
  const vb=document.createElement("input"); vb.className="s"; vb.placeholder="동사(하다)";
  const add=document.createElement("button"); add.className="mini primary"; add.textContent="➕ 주머니에 추가";
  add.onclick=async()=>{const subject=sub.value.trim(); if(!subject)return;
    await fetch("/bag",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({subject,english:en.value.trim(),verb:vb.value.trim()||"하다",routine:true})});
    renderPanels();};
  form.append(sub,en,vb,add); el.appendChild(form);
  return el;
}

function taskEl(t){
  const el=document.createElement("div"); el.className="task";
  el.insertAdjacentHTML("beforeend",
    `<div class="ttl">${t.prefix?t.prefix+" ":""}${t.subject}${t.routine?'<span class="tag">루틴</span>':''}</div>`+
    (t.english?`<div class="en">${t.english}</div>`:""));
  const assign=document.createElement("div"); assign.className="assign";
  kids().forEach(k=>{const b=document.createElement("button"); b.className="mini"; b.textContent="➕ "+k.name;
    b.onclick=async()=>{const d=await (await fetch(`/bag/${t.id}/assign`,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({user:k.id})})).json(); toast(`${k.name} 할 일에 추가`); if(k.id===USER) render(d.board);};
    assign.appendChild(b);});
  const del=document.createElement("button"); del.className="mini del"; del.textContent="✕"; del.title="주머니에서 삭제";
  del.onclick=async()=>{await fetch("/bag/"+t.id,{method:"DELETE"}); renderPanels();};
  assign.appendChild(del); el.appendChild(assign);
  return el;
}

document.getElementById("go").onclick=()=>{const i=document.getElementById("say");act(i.value);i.value="";};
document.getElementById("say").addEventListener("keydown",e=>{if(e.key==="Enter"){act(e.target.value);e.target.value="";}});

const mic=document.getElementById("mic");
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){const rec=new SR(); rec.lang="ko-KR"; mic.onclick=()=>rec.start();
  rec.onresult=e=>{const t=e.results[0][0].transcript; document.getElementById("say").value=t; act(t);};
}else{mic.disabled=true;}
speechSynthesis && (speechSynthesis.onvoiceschanged=()=>{});

// boot: load users, default to first child
refreshUsers();
</script>
</body>
</html>
